<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .icon {
      width: 120px;
      height: 120px;
      animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <img class="icon" src="file:///android_asset/icon.png"
       onerror="this.style.display='none'" />

  <script>
    // Call SplashBridge.done() when your animation is finished
    // to dismiss the splash immediately instead of waiting for the timer.
    // Remove or comment out this line to rely on the timer in app.conf instead.
    setTimeout(() => {
      if (window.SplashBridge) SplashBridge.done();
    }, 1200);
  </script>
</body>
</html>
