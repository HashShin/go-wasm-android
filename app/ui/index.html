<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go + HTML App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png"    href="favicon.png" sizes="32x32" />
</head>
<body>
  <div id="app" class="container" style="display:none">
    <h1 class="title">Go + HTML App</h1>
    <p id="modeTag" class="mode-tag"></p>

    <div class="card">
      <label for="nameInput">Your name</label>
      <input id="nameInput" type="text" placeholder="Enter your name" />
      <button id="greetBtn">Greet (Go)</button>
      <p id="greetResult" class="result"></p>
    </div>

    <div class="card">
      <label for="textInput">Text to process</label>
      <input id="textInput" type="text" placeholder="Enter text" />
      <button id="processBtn">Process (Go)</button>
      <p id="processResult" class="result"></p>
    </div>

    <div class="card">
      <label>Calculator (Go)</label>
      <div class="row">
        <input id="numA" type="number" placeholder="A" />
        <span>+</span>
        <input id="numB" type="number" placeholder="B" />
      </div>
      <button id="addBtn">Add</button>
      <p id="addResult" class="result"></p>
    </div>

    <div class="card">
      <button id="timestampBtn">Get Go Timestamp</button>
      <p id="tsResult" class="result"></p>
    </div>

    <h2 class="section-title">Permission Tests</h2>

    <div class="card">
      <label>Storage</label>
      <div class="btn-row">
        <button id="writeFileBtn">Write File</button>
        <button id="readFileBtn" class="btn-secondary">Read File</button>
      </div>
      <p id="storageResult" class="result"></p>
    </div>

    <div class="card">
      <label>Camera</label>
      <div class="btn-row">
        <button id="cameraBtn">Start Camera</button>
        <button id="stopCameraBtn" class="btn-secondary">Stop</button>
      </div>
      <video id="cameraStream" autoplay playsinline muted></video>
      <p id="cameraResult" class="result"></p>
    </div>

    <div class="card">
      <label>Microphone</label>
      <div class="btn-row">
        <button id="micBtn">Test Mic</button>
        <button id="stopMicBtn" class="btn-secondary">Stop</button>
      </div>
      <div class="volume-track"><div id="volumeFill" class="volume-fill"></div></div>
      <p id="micResult" class="result"></p>
    </div>

    <div class="card">
      <label>Location</label>
      <button id="locationBtn">Get Location</button>
      <p id="locationResult" class="result"></p>
    </div>

    <h2 class="section-title">Notifications</h2>

    <div class="card">
      <label>Test Notification (Go)</label>
      <input id="notifTitle" type="text" placeholder="Title" value="Hello from Go!" />
      <input id="notifBody"  type="text" placeholder="Message" value="This is a test notification" />
      <button id="notifyBtn">Send Notification</button>
      <p id="notifResult" class="result"></p>
    </div>

    <h2 class="section-title">Download</h2>

    <div class="card">
      <label>File URL</label>
      <input id="dlUrl" type="text" value="https://httpbun.com/bytes/70" placeholder="URL to download" />
      <label>Save as</label>
      <input id="dlFilename" type="text" value="test-file.bin" placeholder="filename" />
      <label>Save folder</label>
      <div class="folder-select-row">
        <span id="dlDirDisplay" class="folder-display">Download</span>
        <button id="folderBtn" class="btn-secondary folder-select-btn">Select Folder</button>
      </div>
      <button id="downloadBtn">Download File</button>
      <p id="dlResult" class="result"></p>
    </div>

    <h2 class="section-title">HTTP Tests via Go (httpbun.com)</h2>

    <div class="card">
      <label>GET request</label>
      <p class="hint">Sends a GET to https://httpbun.com/get with query params</p>
      <div class="row">
        <input id="getKey" type="text" placeholder="param name"  value="name" />
        <span>=</span>
        <input id="getVal" type="text" placeholder="param value" value="GoApp" />
      </div>
      <button id="getBtn">Send GET (Go)</button>
      <div id="getStatus" class="status-badge"></div>
      <pre id="getResult" class="result result-pre"></pre>
    </div>

    <div class="card">
      <label>POST request</label>
      <p class="hint">Sends a POST to https://httpbun.com/post with JSON body</p>
      <textarea id="postBody" rows="4">{
  "app": "GoWebApp",
  "message": "Hello from Go!"
}</textarea>
      <button id="postBtn">Send POST (Go)</button>
      <div id="postStatus" class="status-badge"></div>
      <pre id="postResult" class="result result-pre"></pre>
    </div>
  </div>

  <script src="wasm_exec.js"></script>
  <script>
    (async () => {
      const go  = new Go();
      const xhr = await new Promise((ok, err) => {
        const x = new XMLHttpRequest();
        x.open('GET', 'app.wasm', true);
        x.responseType = 'arraybuffer';
        x.onload = () => ok(x.response);
        x.onerror = err;
        x.send();
      });
      const { instance } = await WebAssembly.instantiate(xhr, go.importObject);
      go.run(instance);
    })().catch(console.error);

    if ('serviceWorker' in navigator && location.protocol !== 'file:')
      navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
</body>
</html>
