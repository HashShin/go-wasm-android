<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go + HTML App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png"    href="favicon.png" sizes="32x32" />
</head>
<body>
  <div id="app" class="container" style="display:none">
    <h1 class="title">Go + HTML App</h1>
    <p id="modeTag" class="mode-tag"></p>

    <div class="card">
      <label for="nameInput">Your name</label>
      <input id="nameInput" type="text" placeholder="Enter your name" />
      <button onclick="doGreet()">Greet (Go)</button>
      <p id="greetResult" class="result"></p>
    </div>

    <div class="card">
      <label for="textInput">Text to process</label>
      <input id="textInput" type="text" placeholder="Enter text" />
      <button onclick="doProcess()">Process (Go)</button>
      <p id="processResult" class="result"></p>
    </div>

    <div class="card">
      <label>Calculator (Go)</label>
      <div class="row">
        <input id="numA" type="number" placeholder="A" />
        <span>+</span>
        <input id="numB" type="number" placeholder="B" />
      </div>
      <button onclick="doAdd()">Add</button>
      <p id="addResult" class="result"></p>
    </div>

    <div class="card">
      <button onclick="doTimestamp()">Get Go Timestamp</button>
      <p id="tsResult" class="result"></p>
    </div>

    <h2 class="section-title">HTTP Tests via Go (httpbun.com)</h2>

    <div class="card">
      <label>GET request</label>
      <p class="hint">Sends a GET to https://httpbun.com/get with query params</p>
      <div class="row">
        <input id="getKey" type="text" placeholder="param name"  value="name" />
        <span>=</span>
        <input id="getVal" type="text" placeholder="param value" value="GoApp" />
      </div>
      <button onclick="doGet()">Send GET (Go)</button>
      <div id="getStatus" class="status-badge"></div>
      <pre id="getResult" class="result result-pre"></pre>
    </div>

    <div class="card">
      <label>POST request</label>
      <p class="hint">Sends a POST to https://httpbun.com/post with JSON body</p>
      <textarea id="postBody" rows="4">{
  "app": "GoWebApp",
  "message": "Hello from Go!"
}</textarea>
      <button onclick="doPost()">Send POST (Go)</button>
      <div id="postStatus" class="status-badge"></div>
      <pre id="postResult" class="result result-pre"></pre>
    </div>
  </div>

  <script src="wasm_exec.js" onerror="window._noWasm=true"></script>
  <script>
    const IS_DESKTOP = !window._forceWasm && (location.protocol === 'http:' || location.protocol === 'https:');

    function showApp(mode) {
      document.getElementById('modeTag').textContent = mode;
      const app = document.getElementById('app');
      app.style.display = 'block';
    }

    async function api(path, params) {
      const qs = params ? '?' + new URLSearchParams(params).toString() : '';
      const r = await fetch(path + qs);
      const j = await r.json();
      return j.result;
    }

    function setupDesktopShim() {
      window.GoApp = {
        greet:     (user) => api('/api/greet',     { user }),
        process:   (text) => api('/api/process',   { text }),
        timestamp: ()     => api('/api/timestamp'),
        add:       (a, b) => api('/api/add',       { a, b }),

        httpGet: (url, qs) =>
          fetch('/api/httpget?' + new URLSearchParams({ url, qs: qs || '' }))
            .then(r => r.text()),

        httpPost: (url, body) =>
          fetch('/api/httppost', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, body }),
          }).then(r => r.text()),
      };
      showApp('Desktop (Go HTTP server)');
    }

    async function initWasm() {
      const go = new Go();
      const buf = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'app.wasm', true);
        xhr.responseType = 'arraybuffer';
        xhr.onload = () => resolve(xhr.response);
        xhr.onerror = reject;
        xhr.send();
      });
      const result = await WebAssembly.instantiate(buf, go.importObject);
      go.run(result.instance);
      showApp('Android APK (Go WASM)');
    }

    if (IS_DESKTOP) {
      setupDesktopShim();
    } else {
      initWasm().catch(console.error);
    }

    async function doGreet() {
      const name = document.getElementById('nameInput').value || 'World';
      document.getElementById('greetResult').textContent = await GoApp.greet(name);
    }

    async function doProcess() {
      const text = document.getElementById('textInput').value;
      document.getElementById('processResult').textContent = await GoApp.process(text);
    }

    async function doAdd() {
      const a = parseInt(document.getElementById('numA').value) || 0;
      const b = parseInt(document.getElementById('numB').value) || 0;
      document.getElementById('addResult').textContent = 'Result: ' + await GoApp.add(a, b);
    }

    async function doTimestamp() {
      document.getElementById('tsResult').textContent = 'Unix timestamp: ' + await GoApp.timestamp();
    }

    function setStatus(id, text, ok) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'status-badge ' + (ok ? 'status-ok' : 'status-err');
    }

    function prettyJson(raw) {
      const sep = raw.indexOf('\n\n');
      const status = sep !== -1 ? raw.slice(0, sep) : '';
      const body   = sep !== -1 ? raw.slice(sep + 2) : raw;
      try { return status + '\n\n' + JSON.stringify(JSON.parse(body), null, 2); }
      catch { return raw; }
    }

    async function doGet() {
      const key = document.getElementById('getKey').value || 'param';
      const val = document.getElementById('getVal').value || 'value';
      const el  = document.getElementById('getResult');
      el.textContent = 'Loading…';
      setStatus('getStatus', '…', true);
      try {
        const raw = await GoApp.httpGet('https://httpbun.com/get', key + '=' + encodeURIComponent(val));
        setStatus('getStatus', raw.split('\n')[0], true);
        el.textContent = prettyJson(raw);
      } catch (err) {
        setStatus('getStatus', 'Error', false);
        el.textContent = String(err);
      }
    }

    async function doPost() {
      const body = document.getElementById('postBody').value;
      const el   = document.getElementById('postResult');
      el.textContent = 'Loading…';
      setStatus('postStatus', '…', true);
      try {
        const raw = await GoApp.httpPost('https://httpbun.com/post', body);
        setStatus('postStatus', raw.split('\n')[0], true);
        el.textContent = prettyJson(raw);
      } catch (err) {
        setStatus('postStatus', 'Error', false);
        el.textContent = String(err);
      }
    }
  </script>
</body>
</html>
